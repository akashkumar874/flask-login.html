<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <meta name="google-site-verification" content="DGl3kGkcrKphnnv_YQSq2s71Jq9Rx38w3nUYe06aiio" />

    <!-- update -->

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .box {
            margin-top: 100px;
            padding: 30px;
            background: #1e2a38;
            display: inline-block;
            border-radius: 10px;

            /* Animation */
            animation: fadeIn 1.5s ease-in;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login Form</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
